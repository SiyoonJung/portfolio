<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=388e2875e47e400888fc558f7c08bc9a"></script>
    <script src="https://kit.fontawesome.com/94d2aa96d1.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/location.js"></script>
    <script defer src="js/main.js"></script>
    <title>LOCATION</title>
</head>

<body>
    <header id="header"></header>

    <section class="location">
        <div class="sub-visual">
            <img src="img/sub2.jpg">
        </div>
        <div class="inner">
            <div id="title">
                <div class="bar"></div>
                <h1> LOCATION </h1>
            </div>
            <div id="map"></div>
            <ul class="traffic">
                <li><a href="#">Live Traffic [ON]</a></li>
                <li class="on"><a href="#">Live Traffic [OFF]</a></li>
            </ul>

            <ul class="branch">
                <li class="on" data-index="0"><a href="#">Head Office</a></li>
                <li data-index="1"><a href="#">Branch Office</a></li>
            </ul>
        </div>
    </section>

    <footer id="footer"></footer>
</body>

</html>
